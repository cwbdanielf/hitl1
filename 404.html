<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Human in The Loop</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/Human-in-the-Loop_new1_transparent_150.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .nf-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      background:
        radial-gradient(ellipse 60% 80% at 85% 20%, var(--purple-soft) 0%, transparent 60%),
        radial-gradient(ellipse 50% 70% at 10% 90%, var(--yellow-soft) 0%, transparent 60%),
        var(--bg);
    }
    .nf-wrap img { width: 220px; height: auto; margin-bottom: 24px; }
    .nf-code {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 4rem;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      margin-bottom: 8px;
    }
    .nf-wrap h1 { font-size: 1.6rem; margin-bottom: 12px; }
    .nf-wrap p { color: var(--ink-muted); margin-bottom: 28px; max-width: 30em; }
    .btn-outline {
      border: 2px solid var(--purple);
      color: var(--purple);
      padding: 12px 30px;
      font-size: 1rem;
    }
    .btn-outline:hover {
      background: var(--purple);
      color: #fff;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <main class="nf-wrap">
    <img src="/Human-in-the-Loop_new1_transparent_220.png" alt="Logomarca Human in The Loop">
    <div class="nf-code">404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido. Mas o loop continua — volte para a página inicial.</p>
    <a href="/" class="btn btn-outline">Voltar ao início</a>
  </main>
</body>
</html>
